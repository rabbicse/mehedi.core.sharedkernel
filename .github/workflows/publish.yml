name: CI / Publish Mehedi.Core.SharedKernel

# Build + test on every push to master and on PRs.
# Publish to NuGet only when a version tag (v*.*.*) is pushed.
#
# Release workflow (tag v1.2.0 → Net8=1.2.0, Net10=2.2.0):
#   git tag v1.0.0 && git push --tags        → stable release
#   git tag v1.0.0-rc.1 && git push --tags   → pre-release
on:
  push:
    branches:
      - master
    tags:
      - 'v[0-9]*'
  pull_request:
    branches:
      - master
  workflow_dispatch:

jobs:
  # ── Build & Test ────────────────────────────────────────────────────────────
  build-and-test:
    name: Build & Test (net8 + net10)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore Mehedi.Core.SharedKernel.slnx

      - name: Build
        run: dotnet build Mehedi.Core.SharedKernel.slnx --no-restore --configuration Release

      - name: Unit Tests
        run: dotnet test tests/Mehedi.Core.SharedKernel.UnitTests --no-build --configuration Release --logger "trx" --collect:"XPlat Code Coverage"

      - name: Integration Tests
        run: dotnet test tests/Mehedi.Core.SharedKernel.IntegrationTests --no-build --configuration Release --logger "trx"

      - name: E2E Tests
        run: dotnet test tests/Mehedi.Core.SharedKernel.EndToEndTests --no-build --configuration Release --logger "trx"

  # ── Pack & Publish ──────────────────────────────────────────────────────────
  publish:
    name: Pack & Publish to NuGet
    needs: build-and-test
    # Only runs when a version tag is pushed (e.g. v1.2.0 or v1.2.0-rc.1).
    # Skipped on plain branch pushes, PRs, and manual workflow_dispatch.
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      # Tag v1.2.0 → Mehedi.Core.SharedKernel 1.2.0 / Mehedi.Core.SharedKernel.Net10 2.2.0
      # Net10 major = tag major + 1; minor.patch (+ any pre-release suffix) are shared.
      - name: Extract versions from tag
        id: version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          MAJOR=$(echo "$TAG" | cut -d. -f1)
          SUFFIX=$(echo "$TAG" | cut -d. -f2-)
          echo "NET8_VERSION=$TAG" >> $GITHUB_OUTPUT
          echo "NET10_VERSION=$((MAJOR + 1)).$SUFFIX" >> $GITHUB_OUTPUT

      - name: Restore & Build
        run: dotnet build Mehedi.Core.SharedKernel.slnx --configuration Release

      # Produces two separate packages:
      #   artifacts/Mehedi.Core.SharedKernel.<net8-version>.nupkg       (net8.0)
      #   artifacts/Mehedi.Core.SharedKernel.Net10.<net10-version>.nupkg (net10.0)
      - name: Pack net8.0 → Mehedi.Core.SharedKernel
        run: |
          dotnet pack src/Mehedi.Core.SharedKernel/Mehedi.Core.SharedKernel.csproj \
            --no-build \
            --configuration Release \
            -p:Version=${{ steps.version.outputs.NET8_VERSION }} \
            --output ./artifacts

      - name: Pack net10.0 → Mehedi.Core.SharedKernel.Net10
        run: |
          dotnet pack src/Mehedi.Core.SharedKernel.Net10/Mehedi.Core.SharedKernel.Net10.csproj \
            --no-build \
            --configuration Release \
            -p:Version=${{ steps.version.outputs.NET10_VERSION }} \
            --output ./artifacts

      - name: Push to nuget.org
        run: |
          dotnet nuget push ./artifacts/*.nupkg \
            --api-key ${{ secrets.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
