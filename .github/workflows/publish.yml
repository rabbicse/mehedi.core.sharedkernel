name: publish Mehedi.Core.SharedKernel to nuget

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - 'src/Mehedi.Core.SharedKernel/**'

jobs:
  publish:
    name: build, test, and publish to nuget
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore

      - name: Build (all target frameworks)
        run: dotnet build --no-restore --configuration Release

      - name: Test (unit + integration + e2e)
        run: |
          dotnet test tests/Mehedi.Core.SharedKernel.UnitTests --no-build --configuration Release --logger "trx" --collect:"XPlat Code Coverage"
          dotnet test tests/Mehedi.Core.SharedKernel.IntegrationTests --no-build --configuration Release --logger "trx"
          dotnet test tests/Mehedi.Core.SharedKernel.EndToEndTests --no-build --configuration Release --logger "trx"

      - name: Bump build version
        id: bump
        uses: vers-one/dotnet-project-version-updater@v1.6
        with:
          file: "src/Mehedi.Core.SharedKernel/Mehedi.Core.SharedKernel.csproj"
          version: bump-build

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull
          git add src/Mehedi.Core.SharedKernel/Mehedi.Core.SharedKernel.csproj
          git commit -m "Bump project version to ${{ steps.bump.outputs.newVersion }}"
          git push

      - name: Pack
        run: dotnet pack src/Mehedi.Core.SharedKernel/Mehedi.Core.SharedKernel.csproj --no-build --configuration Release --output ./artifacts

      - name: Publish to nuget.org
        run: dotnet nuget push ./artifacts/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
